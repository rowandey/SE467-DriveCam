name: drivecam
description: "A new Flutter project."
publish_to: 'none'
version: 0.1.1

environment:
  sdk: ^3.10.4

dependencies:
  camera: ^0.12.0
  flutter:
    sdk: flutter
  path: ^1.9.1
  path_provider: ^2.1.5
  provider: ^6.1.5+1
  shared_preferences: ^2.5.4
  sqflite: ^2.4.2
  ffmpeg_kit_flutter_new: ^4.1.0
  video_player: ^2.8.1
  uuid: ^4.5.1
  intl: ^0.20.2
  gal: ^2.3.0
  flutter_launcher_icons: ^0.14.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  # Provides InMemorySharedPreferencesAsync for unit-testing SharedPreferencesAsync
  # without needing a real platform plugin.
  shared_preferences_platform_interface: ^2.4.1
  # Lets the sqflite-based database tests run in a desktop test environment.
  sqflite_common_ffi: ^2.3.4+4

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icons/DriveCamLogoAppIcon.png"
  remove_alpha_ios: true

flutter:
  uses-material-design: true
  assets:
    - assets/icons/
