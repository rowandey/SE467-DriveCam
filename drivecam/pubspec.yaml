name: drivecam
description: "A new Flutter project."
publish_to: 'none'
version: 0.1.1

environment:
  sdk: ^3.10.4

dependencies:
  amplitude_flutter: ^4.5.0
  camera: ^0.12.0
  flutter:
    sdk: flutter
  # Provides access to device sensors (accelerometer, gyroscope, etc.).
  # sensors_plus is used by the sensor monitoring system added to detect
  # crashes/impacts and trigger automatic clip creation.
  sensors_plus: ^3.0.0
  path: ^1.9.1
  path_provider: ^2.1.5
  provider: ^6.1.5+1
  shared_preferences: ^2.5.4
  sqflite: ^2.4.2
  ffmpeg_kit_flutter_new: ^4.1.0
  video_player: ^2.8.1
  uuid: ^4.5.1
  intl: ^0.20.2
  gal: ^2.3.0
  flutter_launcher_icons: ^0.14.0
  # vosk_flutter provides open-source offline speech recognition via the Vosk
  # library. No account or API key is required. A grammar-restricted recognizer
  # listens only for "clip", keeping CPU usage low. The ~40 MB English model is
  # bundled as a Flutter asset and extracted to local storage on first launch.
  # See assets/models/SETUP.md for model download instructions.
  vosk_flutter: ^0.3.48
  wakelock_plus: ^1.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  # Provides InMemorySharedPreferencesAsync for unit-testing SharedPreferencesAsync
  # without needing a real platform plugin.
  shared_preferences_platform_interface: ^2.4.1
  # Lets the sqflite-based database tests run in a desktop test environment.
  sqflite_common_ffi: ^2.3.4+4

# vosk_flutter requires permission_handler ^10.2.0, but permission_handler
# 10.x uses the removed v1 Flutter embedding API on Android. We override it
# here to force the resolver to use 12.x, which uses v2 embedding. The public
# permission_handler API (Permission.microphone.request()) did not change
# between 10 and 12, so vosk_flutter continues to work at runtime.
dependency_overrides:
  permission_handler: ^12.0.0
  permission_handler_android: ^13.0.0

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icons/DriveCamLogoAppIcon.png"
  remove_alpha_ios: true

flutter:
  uses-material-design: true
  assets:
    - assets/icons/
    # Vosk model zip for offline speech recognition.
    # See assets/models/SETUP.md for download instructions.
    - assets/models/
